<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/registro.css">
</head>
<body>
    <script>
        if (localStorage.getItem('tema') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>

    <div style="position: absolute; top: 1.5rem; right: 2rem;">
        <button id="btn-tema" class="btn-tema">🌙 Dark Mode</button>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h2>Criar Conta</h2>
            <p>Preencha os dados abaixo para se cadastrar.</p>
            
            <form id="form-registro">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="O seu nome">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="O seu e-mail">
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Crie uma senha">
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">Confirmar Senha</label>
                    <input type="password" id="confirmarSenha" required placeholder="Repita a senha">
                </div>
                
                <button type="submit" class="btn-primario">Cadastrar</button>
            </form>
            
            <div class="links-uteis">
                <p>Já tem uma conta? <a href="/auth/login.html" id="link-voltar-login">Faça login aqui</a></p>
            </div>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/registro.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
