<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Controle Financeiro</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css"> </head>
<body class="anima-tema">
    <script>
        if (localStorage.getItem('tema') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
    
    <div id="modal-feedback" class="modal-overlay" style="display: none;">
        <div class="modal-content" id="content-feedback">
            <h2 id="feedback-titulo">Notificação</h2>
            <p id="feedback-mensagem"></p>
            <div class="modal-actions">
                <button type="button" class="btn-primario" onclick="fecharFeedback()">Ok</button>
            </div>
        </div>
    </div>
    <div style="position: absolute; top: 1.5rem; right: 2rem;">
        <button id="btn-tema" class="btn-tema">🌙 Dark Mode</button>
    </div>

    <div class="solicitar-conteiner">
        <div class="solicitar-card">
            <h2>Recuperar Senha</h2>
            <p style="margin-bottom: 1.5rem; color: var(--cor-texto-claro); font-size: 0.9rem;">
                Digite seu e-mail abaixo. Se ele estiver cadastrado, enviaremos um link de recuperação.
            </p>
            
            <form id="form-solicitar-recuperacao">
                <div class="input-group">
                    <label for="email">E-mail cadastrado</label>
                    <input type="email" id="email" required placeholder="exemplo@email.com">
                </div>
                
                <button type="submit" id="btn-enviar" class="btn-primario" style="width: 100%;">
                    Enviar Solicitação 
                </button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center;">
                <a href="login.html" style="color: var(--cor-primaria); text-decoration: none; font-size: 0.85rem;">
                    ⬅ Voltar para o Login
                </a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/solicitar-recuperacao.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
