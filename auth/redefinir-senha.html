<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Controle Financeiro</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
    
    <script>
        if (localStorage.getItem('tema') === 'dark') {
           document.body.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body class="anima-tema">

    <div id="modal-feedback" class="modal-overlay" style="display: none;">
        <div class="modal-content" id="content-feedback">
            <h2 id="feedback-titulo">Notificação</h2>
            <p id="feedback-mensagem"></p>
            <div class="modal-actions">
                <button type="button" class="btn-primario" onclick="fecharFeedback()">Ok</button>
            </div>
        </div>
    </div>

    <div style="position: absolute; top: 1.5rem; right: 2rem;">
        <button id="btn-tema" class="btn-tema">🌙 Dark Mode</button>
    </div>

    <div class="solicitar-conteiner">
        <div class="solicitar-card">
            <h2>Nova Senha</h2>
            <p style="margin-bottom: 1.5rem; color: var(--cor-texto-claro); font-size: 0.9rem;">
                Crie uma senha forte com letras maiúsculas, números e caracteres especiais.
            </p>
            
          <form id="form-redefinir-senha">
                <div class="input-group">
                    <label for="novaSenha">Nova Senha</label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="novaSenha" required placeholder="••••••••" style="padding-right: 3rem;">
                        <button type="button" class="btn-toggle-pass" onclick="togglePassword('novaSenha', this)" 
                            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--cor-texto-claro); font-size: 1.2rem;">
                            X
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">Confirmar Nova Senha</label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="confirmarSenha" required placeholder="••••••••" style="padding-right: 3rem;">
                        <button type="button" class="btn-toggle-pass" onclick="togglePassword('confirmarSenha', this)" 
                            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--cor-texto-claro); font-size: 1.2rem;">
                            X
                        </button>
                    </div>
                </div>
                
                <button type="submit" id="btn-redefinir" class="btn-primario" style="width: 100%;">
                    Atualizar Senha
                </button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center;">
                <a href="login.html" style="color: var(--cor-primaria); text-decoration: none; font-size: 0.85rem;">
                    Cancelar e voltar ao login
                </a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/redefinir.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
