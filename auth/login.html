<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <script>
        if (localStorage.getItem('tema') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
    <div style="position: absolute; top: 1.5rem; right: 2rem;">
        <button id="btn-tema" class="btn-tema">🌙 Dark Mode</button>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h2>Bem-vindo de volta!</h2>
            <p>Insira as suas credenciais para entrar no sistema.</p>
            
            <form id="form-login">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="O seu e-mail">
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="A sua senha">
                </div>
                
                <button type="submit" class="btn-primario">Entrar</button>
            </form>
            
            <div class="links-uteis">
                <a href="/auth/solicitar-recuperacao.html" id="link-recuperar">Esqueceu a senha?</a>
                <p>Ainda não tem conta? <a href="/auth/registro.html" id="link-registar">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>
     <script type="module" src="../js/api.js"></script>
     <script type="module" src="../js/auth.js"></script>
     <script type="module" src="../js/app.js"></script>
</body>
</html>
